<title>ClapStore Toys — Daily P&L</title>

<style>
  :root {
    --primary: #FCBB13;
    --primary-dark: #d9a00e;
    --teal: #108474;
    --bg: #0a0d12;
    --card: #141820;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e8ecf1;
    --muted: #8a94a6;
    --border: #1f2937;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); }

  /* Header */
  .header {
    background: linear-gradient(135deg,#0d1117,#161c24,#0d1117);
    padding:16px 32px; border-bottom:2px solid var(--primary);
    display:flex; justify-content:space-between; align-items:center;
  }
  .header-left { display:flex; align-items:center; gap:12px; }
  .header-logo { width:40px; height:40px; border-radius:10px; }
  .header h1 { font-size:20px; font-weight:800; }
  .header .sub { color:var(--muted); font-size:11px; }
  .nav-btn {
    padding:6px 14px; border-radius:6px; border:1px solid var(--border);
    color:var(--muted); text-decoration:none; font-size:10px; font-weight:700;
    letter-spacing:0.3px; transition:all 0.15s;
  }
  .nav-btn:hover { border-color:var(--primary); color:var(--primary); }

  .container { max-width:900px; margin:0 auto; padding:24px 20px; }

  /* Month selector */
  .month-row { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
  .month-btn {
    padding:6px 14px; border-radius:6px; border:1px solid var(--border);
    background:transparent; color:var(--muted); font-size:11px; font-weight:600;
    cursor:pointer; transition:all 0.15s; font-family:inherit;
  }
  .month-btn.active { background:var(--primary); color:#000; border-color:var(--primary); }
  .month-btn:hover:not(.active) { border-color:var(--primary); color:var(--text); }

  /* Calendar grid */
  .cal-grid {
    display:grid; grid-template-columns:repeat(7,1fr); gap:6px;
    margin-bottom:24px;
  }
  .day-btn {
    aspect-ratio:1; border-radius:10px; border:1px solid var(--border);
    background:var(--card); color:var(--muted); font-size:14px; font-weight:700;
    cursor:pointer; transition:all 0.15s; font-family:inherit;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
  }
  .day-btn .day-rev { font-size:8px; font-weight:500; color:var(--muted); }
  .day-btn.has-data { color:var(--text); border-color:rgba(252,187,19,0.2); }
  .day-btn.has-data .day-rev { color:var(--primary); }
  .day-btn.active { background:var(--primary); color:#000; border-color:var(--primary); }
  .day-btn.active .day-rev { color:#000; }
  .day-btn:hover:not(.active) { border-color:var(--primary); transform:translateY(-1px); }
  .day-btn.empty { visibility:hidden; }

  /* P&L Card */
  .pnl-card {
    background:var(--card); border-radius:14px; border:1px solid var(--border);
    padding:24px; margin-bottom:16px;
  }
  .pnl-title {
    font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase;
    letter-spacing:0.8px; margin-bottom:16px; display:flex; align-items:center; gap:8px;
  }
  .pnl-title::before { content:''; width:4px; height:16px; background:var(--primary); border-radius:2px; }
  .pnl-title .badge {
    font-size:9px; padding:2px 8px; border-radius:4px; font-weight:700;
    background:rgba(252,187,19,0.12); color:var(--primary);
  }

  /* Metric rows */
  .metric-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .metric {
    display:flex; justify-content:space-between; align-items:baseline;
    padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04);
  }
  .metric-label { font-size:12px; color:var(--muted); font-weight:500; }
  .metric-value { font-size:16px; font-weight:800; }
  .metric-value.sm { font-size:13px; font-weight:700; }

  /* Highlight metrics */
  .highlight-row {
    display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:16px;
  }
  .highlight {
    text-align:center; padding:14px 8px; border-radius:10px;
    background:rgba(255,255,255,0.02); border:1px solid var(--border);
  }
  .highlight-label { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; font-weight:600; margin-bottom:4px; }
  .highlight-val { font-size:20px; font-weight:800; }
  .highlight-sub { font-size:9px; color:var(--muted); margin-top:2px; }

  .positive { color:var(--green); }
  .negative { color:var(--red); }

  /* Separator */
  .sep { height:1px; background:var(--border); margin:12px 0; }

  /* No data */
  .no-data { text-align:center; padding:40px; color:var(--muted); font-size:13px; }

  @media (max-width:600px) {
    .container { padding:16px 12px; }
    .cal-grid { grid-template-columns:repeat(7,1fr); gap:4px; }
    .day-btn { font-size:12px; }
    .highlight-row { grid-template-columns:repeat(2,1fr); }
    .metric-grid { grid-template-columns:1fr; }
  }
</style>
</head>

// ── DAILY_DATA_END ──

// ── State ──
let curMonth = '';
let curDay = null;

// ── Helpers ──
function fmt(n) {
  if (n == null || isNaN(n)) return '—';
  const abs = Math.abs(n), sign = n < 0 ? '-' : '';
  if (abs >= 1e7) return sign + '\u20B9' + (abs/1e7).toFixed(2) + 'Cr';
  if (abs >= 1e5) return sign + '\u20B9' + (abs/1e5).toFixed(2) + 'L';
  if (abs >= 1e3) return sign + '\u20B9' + (abs/1e3).toFixed(1) + 'K';
  return sign + '\u20B9' + Math.round(abs);
}
function clr(v) { return v >= 0 ? 'positive' : 'negative'; }

// ── Get data for a specific day ──
function getD2CDay(day) {
  const rows = DAILY_D2C[curMonth] || [];
  const matched = rows.filter(r => r.date === String(day));
  if (matched.length === 0) return null;
  // Aggregate categories
  const total = {orders:0,revenue:0,cogs:0,ads:0,profit:0};
  const cats = {};
  matched.forEach(r => {
    total.orders += r.orders||0;
    total.revenue += r.revenue||0;
    total.cogs += r.cogs||0;
    total.ads += r.ads||0;
    total.profit += r.profit||0;
    cats[r.category] = r;
  });
  return {total, cats};
}

function getAMZDay(day) {
  const rows = DAILY_AMZ[curMonth] || [];
  return rows.find(r => r.date === String(day)) || null;
}

// ── Build month buttons ──
function buildMonths() {
  const allMonths = new Set([...Object.keys(DAILY_D2C), ...Object.keys(DAILY_AMZ)]);
  const months = [...allMonths].filter(m => (DAILY_D2C[m]||[]).length > 0 || (DAILY_AMZ[m]||[]).length > 0);
  const order = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  months.sort((a,b) => {
    const [ma,ya] = [a.split(' ')[0], parseInt(a.split(' ')[1])];
    const [mb,yb] = [b.split(' ')[0], parseInt(b.split(' ')[1])];
    return ya !== yb ? ya-yb : order.indexOf(ma)-order.indexOf(mb);
  });
  const row = document.getElementById('monthRow');
  months.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'month-btn';
    btn.textContent = m;
    btn.onclick = () => { curMonth = m; curDay = null; render(); };
    row.appendChild(btn);
  });
  if (months.length > 0) curMonth = months[months.length - 1];
}

// ── Build calendar ──
function buildCalendar() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // Get days with data
  const d2cDays = new Set((DAILY_D2C[curMonth]||[]).map(r => parseInt(r.date)));
  const amzDays = new Set((DAILY_AMZ[curMonth]||[]).map(r => parseInt(r.date)));
  const allDataDays = new Set([...d2cDays, ...amzDays]);

  // Quick revenue lookup per day (D2C only for preview)
  const dayRev = {};
  (DAILY_D2C[curMonth]||[]).forEach(r => {
    const d = parseInt(r.date);
    dayRev[d] = (dayRev[d]||0) + (r.revenue||0);
  });
  (DAILY_AMZ[curMonth]||[]).forEach(r => {
    const d = parseInt(r.date);
    dayRev[d] = (dayRev[d]||0) + (r.revenue||0);
  });

  // Determine max day in this month
  const maxDay = Math.max(28, ...allDataDays);
  const totalDays = Math.min(maxDay, 31);

  for (let d = 1; d <= totalDays; d++) {
    const btn = document.createElement('button');
    const hasData = allDataDays.has(d);
    btn.className = 'day-btn' + (hasData ? ' has-data' : '') + (curDay === d ? ' active' : '');
    let inner = '<span>' + d + '</span>';
    if (hasData && dayRev[d]) {
      inner += '<span class="day-rev">' + fmt(dayRev[d]) + '</span>';
    }
    btn.innerHTML = inner;
    if (hasData) {
      btn.onclick = () => { curDay = d; render(); };
    }
    grid.appendChild(btn);
  }

  // Highlight active month button
  document.querySelectorAll('.month-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === curMonth);
  });
}

// ── Render P&L for selected day ──
function renderPnL() {
  const el = document.getElementById('pnlContent');

  if (!curDay) {
    // Show MTD summary
    const d2cRows = DAILY_D2C[curMonth] || [];
    const amzRows = DAILY_AMZ[curMonth] || [];
    if (d2cRows.length === 0 && amzRows.length === 0) {
      el.innerHTML = '<div class="no-data">No daily data for ' + curMonth + '<br><span style="font-size:11px">Run <code>python3 sync_daily_dashboard.py</code></span></div>';
      return;
    }

    // MTD totals
    let d2c = {orders:0,revenue:0,cogs:0,ads:0,profit:0};
    d2cRows.forEach(r => { d2c.orders+=r.orders||0; d2c.revenue+=r.revenue||0; d2c.cogs+=r.cogs||0; d2c.ads+=r.ads||0; d2c.profit+=r.profit||0; });
    let amz = {orders:0,revenue:0,cogs:0,ads:0,comm:0,profit:0};
    amzRows.forEach(r => { amz.orders+=r.orders||0; amz.revenue+=r.revenue||0; amz.cogs+=r.cogs||0; amz.ads+=r.ads||0; amz.comm+=r.commissions||0; amz.profit+=r.profit||0; });

    const totalRev = d2c.revenue + amz.revenue;
    const totalOrd = d2c.orders + amz.orders;
    const totalAds = d2c.ads + amz.ads;
    const totalProfit = d2c.profit + amz.profit;

    let html = '<div class="pnl-card">';
    html += '<div class="pnl-title">MTD Summary <span class="badge">' + curMonth + '</span></div>';
    html += '<div class="highlight-row">';
    html += highlight('Revenue', fmt(totalRev), '');
    html += highlight('Orders', totalOrd.toLocaleString(), 'AOV ' + fmt(totalOrd > 0 ? totalRev/totalOrd : 0));
    html += highlight('Ads', fmt(totalAds), 'ROAS ' + (totalAds > 0 ? (totalRev/totalAds).toFixed(2) + 'x' : '—'));
    html += highlight('Profit', fmt(totalProfit), totalRev > 0 ? (totalProfit/totalRev*100).toFixed(1)+'%' : '0%', totalProfit);
    html += '</div>';

    html += '<div class="sep"></div>';
    html += '<div class="metric-grid">';
    html += metric('D2C Revenue', fmt(d2c.revenue));
    html += metric('Amazon Revenue', fmt(amz.revenue));
    html += metric('D2C Orders', d2c.orders.toLocaleString());
    html += metric('Amazon Orders', amz.orders.toLocaleString());
    html += metric('D2C Ads', fmt(d2c.ads));
    html += metric('Amazon Commissions', fmt(amz.comm));
    html += metric('D2C Profit', fmt(d2c.profit), d2c.profit);
    html += metric('Amazon Profit', fmt(amz.profit), amz.profit);
    html += '</div>';
    html += '</div>';

    el.innerHTML = html;
    return;
  }

  // Day-specific P&L
  const d2c = getD2CDay(curDay);
  const amz = getAMZDay(curDay);

  if (!d2c && !amz) {
    el.innerHTML = '<div class="no-data">No data for day ' + curDay + '</div>';
    return;
  }

  let html = '';

  // Combined highlights
  const totalRev = (d2c ? d2c.total.revenue : 0) + (amz ? amz.revenue : 0);
  const totalOrd = (d2c ? d2c.total.orders : 0) + (amz ? amz.orders : 0);
  const totalAds = (d2c ? d2c.total.ads : 0) + (amz ? amz.ads : 0);
  const totalProfit = (d2c ? d2c.total.profit : 0) + (amz ? amz.profit : 0);
  const totalCogs = (d2c ? d2c.total.cogs : 0) + (amz ? amz.cogs : 0);

  html += '<div class="pnl-card">';
  html += '<div class="pnl-title">Day ' + curDay + ' <span class="badge">' + curMonth + '</span></div>';
  html += '<div class="highlight-row">';
  html += highlight('Revenue', fmt(totalRev), '');
  html += highlight('Orders', totalOrd.toLocaleString(), 'AOV ' + fmt(totalOrd > 0 ? totalRev/totalOrd : 0));
  html += highlight('Ads', fmt(totalAds), 'ROAS ' + (totalAds > 0 ? (totalRev/totalAds).toFixed(2) + 'x' : '—'));
  html += highlight('Profit', fmt(totalProfit), totalRev > 0 ? (totalProfit/totalRev*100).toFixed(1)+'%' : '0%', totalProfit);
  html += '</div></div>';

  // D2C Card
  if (d2c) {
    html += '<div class="pnl-card">';
    html += '<div class="pnl-title">D2C (Shiprocket)</div>';
    html += '<div class="metric-grid">';
    html += metric('Revenue', fmt(d2c.total.revenue));
    html += metric('Orders', d2c.total.orders.toLocaleString());
    html += metric('COGS', fmt(d2c.total.cogs));
    html += metric('Ads', fmt(d2c.total.ads));
    html += metric('Profit', fmt(d2c.total.profit), d2c.total.profit);
    html += metric('ROAS', d2c.total.ads > 0 ? (d2c.total.revenue/d2c.total.ads).toFixed(2)+'x' : '—');
    html += metric('CAC', fmt(d2c.total.orders > 0 ? d2c.total.ads/d2c.total.orders : 0));
    html += metric('AOV', fmt(d2c.total.orders > 0 ? d2c.total.revenue/d2c.total.orders : 0));
    html += '</div>';

    // Category split
    const catLabels = {busyboard:'Busy Board', softtoy:'Soft Toy', stem:'STEM'};
    const catColors = {busyboard:'var(--primary)', softtoy:'var(--teal)', stem:'var(--green)'};
    if (Object.keys(d2c.cats).length > 1) {
      html += '<div class="sep"></div>';
      html += '<div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Category Split</div>';
      for (const cat in d2c.cats) {
        const c = d2c.cats[cat];
        html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03)">';
        html += '<span style="font-size:11px;color:' + (catColors[cat]||'var(--text)') + ';font-weight:600">' + (catLabels[cat]||cat) + '</span>';
        html += '<span style="font-size:11px">' + (c.orders||0) + ' orders &middot; ' + fmt(c.revenue) + ' &middot; <span class="' + clr(c.profit) + '">' + fmt(c.profit) + '</span></span>';
        html += '</div>';
      }
    }
    html += '</div>';
  }

  // Amazon Card
  if (amz) {
    html += '<div class="pnl-card">';
    html += '<div class="pnl-title">Amazon</div>';
    html += '<div class="metric-grid">';
    html += metric('Revenue', fmt(amz.revenue));
    html += metric('Orders', amz.orders.toLocaleString());
    html += metric('COGS', fmt(amz.cogs));
    html += metric('Commissions', fmt(amz.commissions));
    html += metric('Ad Spend', fmt(amz.ads));
    html += metric('Profit', fmt(amz.profit), amz.profit);
    html += metric('Profit %', amz.profit_pct + '%');
    html += metric('Commission %', amz.comm_pct + '%');
    html += '</div>';
    html += '</div>';
  }

  el.innerHTML = html;
}

function highlight(label, val, sub, colorVal) {
  const c = colorVal !== undefined ? ' ' + clr(colorVal) : '';
  return '<div class="highlight"><div class="highlight-label">' + label + '</div><div class="highlight-val' + c + '">' + val + '</div>' + (sub ? '<div class="highlight-sub">' + sub + '</div>' : '') + '</div>';
}

function metric(label, val, colorVal) {
  const c = colorVal !== undefined ? ' ' + clr(colorVal) : '';
  return '<div class="metric"><span class="metric-label">' + label + '</span><span class="metric-value sm' + c + '">' + val + '</span></div>';
}

// ── Main render ──
function render() {
  buildCalendar();
  renderPnL();
}

// ── Init ──
buildMonths();
render();
</script>
</body>
</html>
