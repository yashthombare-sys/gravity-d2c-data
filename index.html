<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Inter",sans-serif;background:#0a0d12;color:#e8ecf1;min-height:100vh;display:flex;align-items:center;justify-content:center}
.g{background:#141820;border:1px solid #1f2937;border-radius:16px;padding:40px;text-align:center;width:380px}
.g h2{color:#FCBB13;font-size:22px;margin-bottom:8px}

.g input:focus{border-color:#FCBB13}
.g button{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(135deg,#FCBB13,#d9a00e);color:#0a0d12;font-size:15px;font-weight:700;cursor:pointer}
.g button:hover{opacity:0.9}
.g button:disabled{opacity:0.5;cursor:wait}
.e{color:#ef4444;font-size:13px;margin-top:10px;display:none}
.i{color:#8a94a6;font-size:12px;margin-top:16px}
.lk{font-size:48px;margin-bottom:16px}
</style>
