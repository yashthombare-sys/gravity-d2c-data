.g button:hover{opacity:0.9}
.g button:disabled{opacity:0.5;cursor:wait}
.e{color:#ef4444;font-size:13px;margin-top:10px;display:none}
.i{color:#8a94a6;font-size:12px;margin-top:16px}
.lk{font-size:48px;margin-bottom:16px}
</style>
