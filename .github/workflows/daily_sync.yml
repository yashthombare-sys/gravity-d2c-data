name: Daily MTD Sync

on:
  schedule:
    # 8:00 AM IST = 2:30 AM UTC
    - cron: '30 2 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}
        run: echo "$GOOGLE_CREDENTIALS_B64" | base64 -d > shiproket-mis-70c28ae6e7fb.json

      - name: Verify credentials file
        run: python3 -c "import json; json.load(open('shiproket-mis-70c28ae6e7fb.json')); print('Credentials JSON is valid')"

      - name: Run MTD sync
        run: python3 sync_mtd.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mtd_daily_data.json dashboard.html
          git diff --staged --quiet || git commit -m "Auto-sync MTD data $(date -u +%Y-%m-%d)"
          git push
