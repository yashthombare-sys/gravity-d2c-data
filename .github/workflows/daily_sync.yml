name: Daily MTD Sync

on:
  # Primary trigger: runs AFTER Amazon sync completes (success or failure)
  workflow_run:
    workflows: ["Amazon Daily Sync (Last 4 Days)"]
    types: [completed]
  schedule:
    # Fallback: 10:00 AM IST = 4:30 AM UTC (in case Amazon sync didn't trigger)
    - cron: '30 4 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

concurrency:
  group: mtd-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth python-dateutil

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}
        run: echo "$GOOGLE_CREDENTIALS_B64" | base64 -d > shiproket-mis-70c28ae6e7fb.json

      - name: Verify credentials file
        run: python3 -c "import json; json.load(open('shiproket-mis-70c28ae6e7fb.json')); print('Credentials JSON is valid')"

      - name: Run MTD sync
        run: python3 sync_mtd.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mtd_daily_data.json dashboard.html
          git diff --staged --quiet || git commit -m "Auto-sync MTD data $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          for i in 1 2 3; do
            git push && break
            echo "Push attempt $i failed, pulling and retrying..."
            sleep 5
            git pull --rebase origin main
          done

      - name: Report failure
        if: failure()
        run: |
          echo "::error::Daily MTD Sync failed at $(date -u +%Y-%m-%dT%H:%M:%S)Z"
          echo "Check the logs above for details. Common causes:"
          echo "  - Google Sheets API rate limit (429)"
          echo "  - Tab name not found for current month"
          echo "  - Column layout changed in the sheet"
          echo "  - Git push conflict with Amazon sync"
