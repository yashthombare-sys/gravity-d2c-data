name: Daily Sync Trigger (Backup)

on:
  schedule:
    # 9:00 AM IST = 3:30 AM UTC — runs AFTER Amazon sync cron
    # If Amazon already ran, this does nothing.
    # MTD sync auto-triggers after Amazon via workflow_run, so we only check Amazon.
    - cron: '30 3 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  actions: write
  contents: read

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Check if Amazon sync ran today
        id: check-amazon
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          LAST_RUN=$(gh run list --workflow="Amazon Daily Sync (Last 4 Days)" --limit 1 --json createdAt --jq '.[0].createdAt' --repo "$GITHUB_REPOSITORY" 2>/dev/null || echo "")
          if echo "$LAST_RUN" | grep -q "$TODAY"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Amazon sync already ran today ($LAST_RUN)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Amazon sync has NOT run today — triggering now"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Amazon sync if missed
        if: steps.check-amazon.outputs.skip == 'false'
        run: |
          gh workflow run "Amazon Daily Sync (Last 4 Days)" --repo "$GITHUB_REPOSITORY"
          echo "Amazon sync triggered — MTD sync will auto-follow via workflow_run"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
