name: Amazon Daily Sync (Last 4 Days)

on:
  schedule:
    # 6:00 AM IST = 0:30 AM UTC
    - cron: '30 0 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

concurrency:
  group: data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth requests python-dateutil

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}
        run: echo "$GOOGLE_CREDENTIALS_B64" | base64 -d > shiproket-mis-70c28ae6e7fb.json

      - name: Verify credentials file
        run: python3 -c "import json; json.load(open('shiproket-mis-70c28ae6e7fb.json')); print('Credentials JSON is valid')"

      - name: Write .env file
        env:
          AMAZON_CLIENT_ID: ${{ secrets.AMAZON_CLIENT_ID }}
          AMAZON_CLIENT_SECRET: ${{ secrets.AMAZON_CLIENT_SECRET }}
          AMAZON_REFRESH_TOKEN: ${{ secrets.AMAZON_REFRESH_TOKEN }}
        run: |
          printf 'AMAZON_CLIENT_ID=%s\nAMAZON_CLIENT_SECRET=%s\nAMAZON_REFRESH_TOKEN=%s\n' \
            "$AMAZON_CLIENT_ID" "$AMAZON_CLIENT_SECRET" "$AMAZON_REFRESH_TOKEN" > .env

      - name: Write Amazon sheet ID
        env:
          AMAZON_SHEET_ID: ${{ secrets.AMAZON_SHEET_ID }}
        run: |
          if [ -n "$AMAZON_SHEET_ID" ]; then
            echo "$AMAZON_SHEET_ID" > .amazon_daily_sheet_id
            echo "Using sheet ID from secret"
          else
            echo "⚠️ AMAZON_SHEET_ID secret not set — will use existing file or create new sheet"
          fi

      - name: Run Amazon daily sync (last 4 days, with smart retry)
        run: python3 amazon_daily_mis.py --last4

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add amazon_daily_*.json
          git diff --staged --quiet || git commit -m "Auto-sync Amazon daily data $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          for i in 1 2 3; do
            git push && break
            echo "Push attempt $i failed, pulling and retrying..."
            sleep 5
            git pull --rebase origin main
          done

      - name: Report failure
        if: failure()
        run: |
          echo "::error::Amazon Daily Sync failed at $(date -u +%Y-%m-%dT%H:%M:%S)Z"
          echo "The script retries failed steps after 20 min automatically."
          echo "If you see this, BOTH attempts failed. Check logs above."
          echo "Common causes:"
          echo "  - Amazon SP-API refresh token expired (re-authorize in Seller Central)"
          echo "  - Google Sheets API quota exhausted"
